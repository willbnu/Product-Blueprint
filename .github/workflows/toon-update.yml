name: Update TOON Cache

on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/**/*.md'
      - 'README.md'
      - '**/*.md'
      - '.toon/config.json'
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: toon-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-toon:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for accurate change detection

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate TOON files
        run: |
          echo "🚀 Generating TOON files..."
          node tools/toon/generate-all.js

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet .toon/; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "✅ No TOON changes detected"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "📝 TOON changes detected"
          fi

      - name: Commit TOON updates
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config user.name "TOON Generator Bot"
          git config user.email "toon-bot@github-actions"
          git add .toon/
          git commit -m "chore: update TOON cache [skip ci]

          Automatically generated TOON (Token-Oriented Object Notation) files
          for optimized AI agent consumption.

          $(cat .toon/stats.json | grep -A5 'tokens' || echo 'Token statistics updated')"
          git push

      - name: Display stats
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          echo "📊 TOON Generation Summary:"
          cat .toon/stats.json

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request' && steps.check_changes.outputs.changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const stats = require('./.toon/stats.json');
            const comment = `## 🤖 TOON Cache Updated

            Token-efficient versions generated for AI agents:

            - **Files processed:** ${stats.files}
            - **Original tokens:** ${stats.tokens.original.toLocaleString()}
            - **Compressed tokens:** ${stats.tokens.compressed.toLocaleString()}
            - **Tokens saved:** ${stats.tokens.saved.toLocaleString()} (${stats.tokens.savingsPercent}%)

            AI agents reading this repository will automatically use the optimized TOON versions, saving ${stats.tokens.savingsPercent}% tokens.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.name,
              body: comment
            });
